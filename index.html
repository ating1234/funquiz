<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Quizzes｜當代發瘋與靈魂狀態大解析 🧠</title>
    <meta name="description" content="當代年輕人精神狀態與內耗大解析！提供最精準毒舌的雙重人格、內耗怪獸與擺爛守護神測驗，一秒看清真實自我！">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            /* 糖果馬卡龍色 */
            --accent-purple: #818cf8;
            --accent-pink: #f472b6;
            --accent-cyan: #22d3ee;
            --accent-yellow: #fef08a;
            --accent-green: #34d399;
            --accent-orange: #fb923c;
            
            --font-outfit: 'Outfit', 'Noto Sans TC', sans-serif;
            --bounce-transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(129, 140, 248, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(254, 240, 138, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        /* 漂浮的 Emoji 裝飾 (脆友/00後美學) */
        .decor-emoji {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.25;
            user-select: none;
        }
        .emoji-1 { top: 8%; left: 8%; animation: floatSlow 6s ease-in-out infinite; }
        .emoji-2 { top: 25%; right: 10%; animation: floatSlow 8s ease-in-out infinite 1s; }
        .emoji-3 { bottom: 20%; left: 12%; animation: floatSlow 7s ease-in-out infinite 2s; }
        .emoji-4 { bottom: 8%; right: 8%; animation: floatSlow 9s ease-in-out infinite 0.5s; }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-22px) rotate(22deg); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 平台 Header - 活潑俏皮 */
        header {
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
        }

        header h1 {
            font-family: var(--font-outfit);
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #4f46e5 0%, var(--accent-pink) 50%, var(--accent-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: inline-block;
            transform: rotate(-1.5deg);
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-2deg) scale(0.96); }
            50% { transform: rotate(2deg) scale(1.04); }
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* 卡片樣式 - 活潑泡泡糖 Neobrutalism */
        .glass-card {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 32px 22px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 16px 0 rgba(15, 23, 42, 0.03), 0 20px 40px rgba(100, 116, 139, 0.05);
            transition: var(--bounce-transition);
            position: relative;
            margin-bottom: 24px;
        }

        /* 首頁測驗選擇清單 */
        .quiz-hub-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .quiz-select-card {
            background: #ffffff;
            border: 2.5px solid var(--card-border);
            border-radius: 24px;
            padding: 24px 20px;
            cursor: pointer;
            transition: var(--bounce-transition);
            text-align: left;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 9px 0 var(--card-border);
            
            /* 卡片進入交錯動畫 - 幅度加大 */
            opacity: 0;
            transform: translateY(75px);
            animation: cardEntrance 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.45) forwards;
        }

        .quiz-select-card:nth-child(1) { animation-delay: 0.05s; }
        .quiz-select-card:nth-child(2) { animation-delay: 0.25s; }
        .quiz-select-card:nth-child(3) { animation-delay: 0.45s; }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .quiz-select-card:hover {
            /* 傾斜與上浮幅度加倍 */
            transform: translateY(-18px) rotate(3.5deg) scale(1.04);
            border-color: var(--accent-purple);
            box-shadow: 0 27px 0 var(--accent-purple), 0 27px 45px rgba(99, 102, 241, 0.25);
        }

        /* 標籤徽章 */
        .quiz-badge {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-monster { background-color: #fee2e2; color: #ef4444; }
        .badge-split { background-color: #e0e7ff; color: #4f46e5; }
        .badge-deity { background-color: #fef9c3; color: #a16207; }

        .quiz-select-card h3 {
            font-size: 19px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .quiz-select-card p {
            font-size: 13.5px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .quiz-select-card .play-btn {
            font-size: 13px;
            font-weight: 800;
            color: var(--accent-purple);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: auto;
        }

        .quiz-select-card .play-btn svg {
            transition: transform 0.2s ease;
        }

        .quiz-select-card:hover .play-btn svg {
            transform: translateX(4px);
        }

        /* 封面眼球與裝飾 */
        .quiz-cover-box {
            text-align: center;
        }

        .cover-illustration {
            width: 140px;
            height: 140px;
            margin: 12px auto 20px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monster-eye {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 0 var(--card-border);
            animation: float 3s ease-in-out infinite, blink 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2.5px solid var(--text-main);
        }

        .monster-pupil {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            border-radius: 50%;
            position: relative;
            transition: transform 0.05s ease;
        }

        .monster-pupil::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }

        /* 霓虹背景點綴 (極光流動效果) - 大小與幅度加倍 */
        .glow-circle {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -2;
            pointer-events: none;
            user-select: none;
            opacity: 0.85;
        }
        .glow-1 {
            top: 10%;
            left: -5%;
            background: rgba(129, 140, 248, 0.18);
            animation: glowMove1 8s ease-in-out infinite alternate;
        }
        .glow-2 {
            bottom: 10%;
            right: -5%;
            background: rgba(244, 114, 182, 0.15);
            animation: glowMove2 10s ease-in-out infinite alternate;
        }

        @keyframes glowMove1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(135px, -165px) scale(1.5); }
            100% { transform: translate(-75px, 105px) scale(0.8); }
        }
        @keyframes glowMove2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-165px, 165px) scale(0.7); }
            100% { transform: translate(105px, -105px) scale(1.45); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .eye-panic {
            animation: float 3s ease-in-out infinite, panic 0.08s ease-in-out infinite !important;
        }

        @keyframes panic {
            0%, 100% { transform: translate(0, 0) scale(1.4) rotate(0deg); }
            20% { transform: translate(-8px, 8px) scale(1.4) rotate(-7deg); }
            40% { transform: translate(8px, -8px) scale(1.4) rotate(7deg); }
            60% { transform: translate(-8px, -8px) scale(1.4) rotate(-4deg); }
            80% { transform: translate(8px, 8px) scale(1.4) rotate(4deg); }
        }

        .cover-title {
            font-size: 26px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .cover-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* 進度條 */
        .progress-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.04);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 28px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink), var(--accent-orange));
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 題目選項 */
        .question-text {
            font-size: 19px;
            font-weight: 900;
            line-height: 1.5;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-item {
            background: #ffffff;
            border: 2px solid var(--card-border);
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: var(--bounce-transition);
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 0 var(--card-border);
        }

        .option-item:hover {
            border-color: var(--accent-purple);
            transform: translateX(9px) rotate(-0.7deg);
            box-shadow: 0 12px 0 var(--accent-purple);
        }

        .option-prefix {
            font-family: var(--font-outfit);
            font-weight: 900;
            color: var(--accent-purple);
            margin-right: 14px;
            font-size: 17px;
        }

        /* 動作按鈕 - Q彈效果 */
        .btn {
            background: linear-gradient(135deg, var(--accent-purple) 0%, #6366f1 100%);
            color: #ffffff;
            border: 2px solid var(--text-main);
            border-radius: 20px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: var(--bounce-transition);
            box-shadow: 0 6px 0 var(--text-main);
        }

        .btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 0 var(--text-main);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 var(--text-main);
        }

        .btn-back-hub {
            background: transparent;
            border: 2px solid var(--card-border);
            color: var(--text-muted);
            border-radius: 18px;
            padding: 12px;
            font-size: 13.5px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 14px;
            transition: var(--bounce-transition);
            box-shadow: 0 3px 0 var(--card-border);
        }

        .btn-back-hub:hover {
            background: #ffffff;
            color: var(--text-main);
            border-color: var(--text-main);
            box-shadow: 0 6px 0 var(--text-main);
            transform: translateY(-3px);
        }

        /* 載入中 */
        .loading-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 12px;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid rgba(129, 140, 248, 0.1);
            border-left-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 結果展示頁 */
        .result-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-pink);
            font-weight: 900;
            margin-bottom: 6px;
            text-align: center;
        }

        .monster-name {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, var(--accent-purple) 50%, var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: rotate(-1.5deg);
            animation: titleWobble 2s ease-in-out infinite;
        }

        @keyframes titleWobble {
            0%, 100% { transform: rotate(-1.5deg) scale(1); }
            50% { transform: rotate(1.5deg) scale(1.035); }
        }

        .chart-container {
            width: 100%;
            max-width: 270px;
            margin: 0 auto 24px auto;
            position: relative;
        }

        #radarChart {
            background: transparent;
            display: block;
            margin: 0 auto;
        }

        .result-desc {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-main);
            text-align: justify;
            background: #ffffff;
            border: 2px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 0 var(--card-border);
        }

        .result-desc p {
            margin-bottom: 12px;
        }
        .result-desc p:last-child {
            margin-bottom: 0;
        }

        .matching-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .match-card {
            background: #ffffff;
            border: 2px solid var(--card-border);
            border-radius: 20px;
            padding: 14px 12px;
            text-align: center;
            box-shadow: 0 4px 0 var(--card-border);
        }

        .match-type {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .match-name {
            font-size: 14px;
            font-weight: 900;
        }
        .match-name.fit { color: var(--accent-purple); }
        .match-name.avoid { color: var(--accent-pink); }

        .actions-group {
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
        }

        .btn-outline {
            background: #ffffff;
            border: 2px solid var(--card-border);
            color: var(--text-main);
            border-radius: 18px;
            padding: 15px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            flex: 1;
            transition: var(--bounce-transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 3px 0 var(--card-border);
        }

        .btn-outline:hover {
            border-color: var(--text-main);
            box-shadow: 0 6px 0 var(--text-main);
            transform: translateY(-3px);
        }

        .btn-outline:active {
            transform: translateY(3px);
            box-shadow: 0 1.5px 0 var(--text-main);
        }

        /* 法律條款與廣告 */
        .legal-notice {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-top: 24px;
            border-top: 2px solid var(--card-border);
            padding-top: 14px;
            text-align: center;
        }

        .adsense-slot {
            margin: 20px 0;
            background: #ffffff;
            border: 2px dashed var(--card-border);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            font-size: 10.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        /* 題目切換 Q 彈動畫 */
        .question-box {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.35) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.7) rotate(-3deg); opacity: 0; }
            70% { transform: scale(1.06) rotate(0.7deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes popOut {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.7) rotate(3deg); opacity: 0; }
        }

        /* --- 3x3 九宮格響應式與放大 --- */
        body.hub-view-large .container {
            max-width: 960px;
        }

        @media (min-width: 520px) {
            .quiz-hub-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
        }

        @media (min-width: 768px) {
            .quiz-hub-list {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 18px;
            }
        }

        /* 徽章與排名樣式 */
        .quiz-select-card {
            position: relative;
            overflow: visible;
        }

        .rank-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            font-size: 11px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 99px;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3);
            border: 2px solid white;
            z-index: 10;
            transform: rotate(5deg);
        }

        .rank-badge.rank-1 {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            font-size: 12px;
            padding: 5px 12px;
        }
        .rank-badge.rank-2 {
            background: linear-gradient(135deg, #94a3b8 0%, #475569 100%);
        }
        .rank-badge.rank-3 {
            background: linear-gradient(135deg, #b45309 0%, #78350f 100%);
        }

        .hot-label {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 6px;
            vertical-align: middle;
            text-transform: uppercase;
        }
        .hot-label.god { background-color: #fee2e2; color: #ef4444; }
        .hot-label.glass { background-color: #dbeafe; color: #1d4ed8; }
        .hot-label.fight { background-color: #fef3c7; color: #d97706; }

        /* 點讚列樣式 */
        .vote-bar {
            display: flex;
            gap: 12px;
            margin-top: auto;
            border-top: 1.5px dashed var(--card-border);
            padding-top: 14px;
            user-select: none;
        }

        .vote-btn {
            background: #f8fafc;
            border: 2px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--bounce-transition);
            box-shadow: 0 3px 0 var(--card-border);
        }

        .vote-btn:hover {
            transform: scale(1.1) rotate(2deg);
            background: #ffffff;
            border-color: var(--text-main);
            box-shadow: 0 3px 0 var(--text-main);
        }

        .vote-btn:active {
            transform: scale(0.9);
            box-shadow: 0 1px 0 var(--text-main);
        }

        .vote-btn.active-up {
            background-color: #fee2e2;
            border-color: #f43f5e;
            color: #e11d48;
            box-shadow: 0 3px 0 #f43f5e;
        }

        .vote-btn.active-down {
            background-color: #e0f2fe;
            border-color: #0ea5e9;
            color: #0284c7;
            box-shadow: 0 3px 0 #0ea5e9;
        }

        /* 籌備中卡片特別處理 */
        .card-coming-soon {
            opacity: 0.85;
            background: rgba(255, 255, 255, 0.6);

        // 眼睛跟隨滑鼠與觸控 (Q彈活潑版，安全範圍限縮防掉出)
        function updateEyePosition(clientX, clientY) {
            if (!monsterEye || !monsterPupil || isNaN(clientX) || isNaN(clientY)) return;
            const eyeRect = monsterEye.getBoundingClientRect();
            const eyeCenterX = eyeRect.left + eyeRect.width / 2;
            const eyeCenterY = eyeRect.top + eyeRect.height / 2;
            
            const dx = clientX - eyeCenterX;
            const dy = clientY - eyeCenterY;
            const angle = Math.atan2(dy, dx);
            
            // 眼球半徑 40px - 瞳孔半徑 16px = 24px 臨界值。
            // 減少 25% 最大距離限制設定為 16px，確保在任何裝置上瞳孔都不會掉到眼球外面
            const maxDistance = 16; 
            const distance = Math.min(maxDistance, Math.hypot(dx, dy) / 12);
            
            const pupilX = Math.cos(angle) * distance;
            const pupilY = Math.sin(angle) * distance;
            
            monsterPupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
        }

        document.addEventListener('mousemove', (e) => {

        });

                                    <span>${opt.text}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            const items = quizQuestionWrapper.querySelectorAll('.option-item');
            items.forEach(item => {
                item.addEventListener('click', () => {
                    const idx = parseInt(item.getAttribute('data-idx'));
                    handleAnswer(idx);
                });
            });
        }

        function handleAnswer(optionIdx) {
            const weights = activeQuiz.questions[currentQuestionIdx].options[optionIdx].weight;
            for (let k in weights) {
                if (score[k] !== undefined) {
                    score[k] += weights[k];
                }
            }

            currentQuestionIdx++;
            if (currentQuestionIdx < activeQuiz.questions.length) {
                const box = quizQuestionWrapper.querySelector('.question-box');
                box.style.animation = 'popOut 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.35) forwards';
                setTimeout(showQuestion, 200);
            } else {
                progressBar.style.width = '100%';
                setTimeout(showLoading, 250);
            }
        }

        function showLoading() {
            viewQuiz.style.display = 'none';
            viewLoading.style.display = 'flex';
            loadingText.innerText = activeQuiz.loadingText || "靈魂發瘋分析中...";

            setTimeout(() => {
                viewLoading.style.display = 'none';
                showResult();
            }, 2000);
        }

        function showResult() {
            viewResult.style.display = 'block';
            
            let maxKey = Object.keys(score)[0];
            let maxVal = -1;
            for (let k in score) {
                if (score[k] > maxVal) {
                    maxVal = score[k];
                    maxKey = k;
                }
            }

            const result = activeQuiz.results[maxKey];
            
            resultName.innerText = result.name;
            resultDesc.innerHTML = result.desc;
            matchFit.innerText = result.fit;
            matchAvoid.innerText = result.avoid;

            btnShare.onclick = async () => {
                const text = `🧠 心理測驗【${activeQuiz.title}】檢測完畢！\n我測出的狀態是「${result.name}」，這真的太寫實了！\n快來召喚你的擺爛守護神/內耗怪獸：`;
                const url = `${window.location.origin}${window.location.pathname}#${activeQuiz.id}`;
                const shareData = {
                    title: `Fun Quizzes`,
                    text: `${text}\n${url}`
                };

                if (navigator.share) {
                    try {
                        await navigator.share(shareData);
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            fallbackShare(text + "\n" + url);
                        }
                    }
                } else {
                    fallbackShare(text + "\n" + url);
                }
            };

            drawRadar(result.stats);
        }

        function fallbackShare(shareText) {
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = shareText;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            alert('測驗結果與專屬連結已複製到剪貼簿！快去 Threads / IG 自嘲發文吧！🚀');
        }

        // ================= 動態雷達圖繪製 =================
        function drawRadar(stats) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 70;
            const labels = Object.keys(stats);
            const values = Object.values(stats);
            const numAxes = labels.length;

            let frame = 0;
            const totalFrames = 35; // 動畫持續 35 幀

            function animate() {
                frame++;
                const t = frame / totalFrames;
                // 彈性過衝緩動公式 (減少 25% 過衝強度，先膨脹到 1.20 再彈回 1)
                let progress = 1 - Math.pow(1 - t, 3) * (1 - (t - 1) * (3.8 * (t - 1) + 2.4));
                if (progress > 1.20) progress = 1.20; 
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 1. 網格背景
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.05)';
                ctx.lineWidth = 1.5;
                for (let j = 1; j <= 4; j++) {
                    const r = (radius / 4) * j;
                    ctx.beginPath();
                    for (let i = 0; i < numAxes; i++) {
                        const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                        const x = centerX + Math.cos(angle) * r;
                        const y = centerY + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                // 2. 軸與標籤
                ctx.fillStyle = '#475569';
                ctx.font = '900 11px Noto Sans TC';
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                    ctx.stroke();

                    const labelX = centerX + Math.cos(angle) * (radius + 20);
                    let labelY = centerY + Math.sin(angle) * (radius + 15);

                    if (Math.abs(Math.sin(angle)) < 0.1) {
                        ctx.textAlign = Math.cos(angle) > 0 ? 'left' : 'right';
                    } else {
                        ctx.textAlign = 'center';
                        if (Math.sin(angle) > 0) labelY += 4;
                    }
                    ctx.fillText(labels[i], labelX, labelY);
                }

                // 3. 雷達面積 (依進度縮放，包含彈性過衝)
                ctx.beginPath();
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    const ratio = (values[i] / 100) * progress;
                    const x = centerX + Math.cos(angle) * (radius * ratio);
                    const y = centerY + Math.sin(angle) * (radius * ratio);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();

                // 炫彩糖果色漸層填充
                const grad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, radius);
                grad.addColorStop(0, 'rgba(129, 140, 248, 0.3)');
                grad.addColorStop(0.6, 'rgba(244, 114, 182, 0.4)');
                grad.addColorStop(1, 'rgba(251, 146, 60, 0.45)');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = '#818cf8';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // 4. 點標記
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    const ratio = (values[i] / 100) * progress;
                    const x = centerX + Math.cos(angle) * (radius * ratio);
                    const y = centerY + Math.sin(angle) * (radius * ratio);

                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#f472b6';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                if (frame < totalFrames) {
                    requestAnimationFrame(animate);
                } else {
                    renderRadarFrame(stats, 1.0);
                }
            }

            function renderRadarFrame(stats, endProgress) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.05)';
                ctx.lineWidth = 1.5;
                for (let j = 1; j <= 4; j++) {
                    const r = (radius / 4) * j;
                    ctx.beginPath();
                    for (let i = 0; i < numAxes; i++) {
                        const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                        const x = centerX + Math.cos(angle) * r;
                        const y = centerY + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
                ctx.fillStyle = '#475569';
                ctx.font = '900 11px Noto Sans TC';
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                    ctx.stroke();
                    const labelX = centerX + Math.cos(angle) * (radius + 20);
                    let labelY = centerY + Math.sin(angle) * (radius + 15);
                    if (Math.abs(Math.sin(angle)) < 0.1) {
                        ctx.textAlign = Math.cos(angle) > 0 ? 'left' : 'right';
                    } else {
                        ctx.textAlign = 'center';
                        if (Math.sin(angle) > 0) labelY += 4;
                    }
                    ctx.fillText(labels[i], labelX, labelY);
                }
                ctx.beginPath();
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    const ratio = (values[i] / 100) * endProgress;
                    const x = centerX + Math.cos(angle) * (radius * ratio);
                    const y = centerY + Math.sin(angle) * (radius * ratio);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                const grad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, radius);
                grad.addColorStop(0, 'rgba(129, 140, 248, 0.3)');
                grad.addColorStop(0.6, 'rgba(244, 114, 182, 0.4)');
                grad.addColorStop(1, 'rgba(251, 146, 60, 0.45)');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#818cf8';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                for (let i = 0; i < numAxes; i++) {
                    const angle = (i * 2 * Math.PI / numAxes) - Math.PI / 2;
                    const ratio = (values[i] / 100) * endProgress;
                    const x = centerX + Math.cos(angle) * (radius * ratio);
                    const y = centerY + Math.sin(angle) * (radius * ratio);
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#f472b6';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            animate();
        }
    </script>
